# Capability Interface Descriptor (CID): secrets@1.x
#
# ADR-0022 (Capability Host Contract) + ADR-0024 (Canonical Plugin Format) +
# ADR-0011 (Mediated Plugin Boundary). This is a host/registry-owned org-level
# contract. v1 format is TOML (the .px grammar at pluresdb-px rev 195c67b has no
# `capability` construct — verified against crates/pluresdb-px/src/px/grammar.pest
# the same way git-repo.cid.toml / pim.cid.toml / commerce.cid.toml were; the
# .px-native CID form is deferred to a real upstream grammar construct, NOT stubbed).
#
# This descriptor is grounded ENTIRELY in the real plures-vault surface. Every
# node / operation / event / invariant below maps to a SHIPPED vault type or
# method — cited inline as crate:file:symbol. Grounding sources (read, not guessed):
#   - vault-core   crates/vault-core/src/lib.rs
#       VaultManager (init_vault, unlock_vault, is_unlocked, lock,
#       add_credential, get_credential[_by_id], list_credentials,
#       update_credential[_by_id], delete_credential[_by_id],
#       set_credential_metadata, get_credential_metadata, delete_credential_metadata,
#       record_sync_metadata, get_sync_metadata),
#       Credential, CredentialMetadata, SyncMetadata, VaultConfig,
#       KeyDerivationParams, VaultError; backed by pluresdb::CrdtStore.
#   - vault-crypto crates/vault-crypto/src/lib.rs
#       VaultCrypto (derive_master_key, verify_password, encrypt, decrypt),
#       MasterKey (ZeroizeOnDrop), EncryptedData{ciphertext,nonce};
#       Argon2id KDF + AES-256-GCM. THIS is what makes "encrypted at rest" real.
#   - vault-sync   crates/vault-sync/src/lib.rs
#       SyncManager over pluresdb::CrdtStore (GUN-relay P2P CRDT replication),
#       VaultSyncEvent{PeerConnected,PeerDisconnected,CredentialSynced,SyncError}.
#   - vault-graph  crates/vault-graph/src/lib.rs
#       SecretNodeKind{Credential,Group,Tag,Environment,Service},
#       RelationshipType{DependsOn,GroupMember,TaggedWith,DerivedFrom,SharedWith,
#       Supersedes,BundledWith} — the relationship surface secrets can expose.
#   - vault-akv    crates/vault-akv/src/lib.rs (PROVIDER-IMPLEMENTATION DETAIL,
#       not abstract CID surface): AkvSyncManager mirrors credentials to Azure Key
#       Vault. Proves `secrets` is BACKEND-AGNOSTIC — a provider MAY back it with
#       local vault-crypto OR Azure Key Vault (or both, bidirectionally synced).
#   - vault-core   crates/vault-core/src/windows_hello.rs (PROVIDER DETAIL):
#       Windows Hello / DPAPI master-key protection — an ALTERNATIVE unlock factor
#       for the unlock operation, Windows-only, graceful-fallback to password.
#
# THE CARDINAL RULE OF THIS CONTRACT: the PLAINTEXT secret value is NEVER a freely
# replicated CRDT node. vault-core stores `encrypted_password` / `encrypted_notes`
# (vault-crypto EncryptedData) in PluresDB; plaintext exists ONLY transiently in
# memory after an unlock-gated retrieve (VaultManager::get_credential, which calls
# require_master_key()). The CID models this as a hard invariant, not a convention.
#
# A provider plugin declaring `[capabilities.provided] secrets = "1.x"` MUST
# implement the non-deferred surface; the capability-deps gate
# (pares-modulus gates/validate-dependencies.ts) validates the provider's declared
# surface against this CID at install AND resolves a consumer's
# `capabilities.requires.secrets` against it (ADR-0022 §7). A consumer interacts
# ONLY through the mediated nodes/events below — no direct function references
# cross the plugin boundary (ADR-0011). Items marked `deferred = true` are post-v1
# (C-NOSTUB-001: deferred, not stubbed) and are NOT required of a v1 provider; each
# deferral cites the real vault-core method that is absent today.

[cid]
name = "secrets"
version = "1.0.0"
title = "Zero-trust, locally-encrypted, CRDT-synced credential store (unlock/lock gated)"
summary = """
A secret-management capability: store named credentials whose secret material is
encrypted at rest (vault-crypto: Argon2id-derived key + AES-256-GCM) and only ever
decrypted transiently, in memory, behind an explicit unlock. The vault has a
lock/unlock lifecycle (a master key held only while unlocked); every read of a
secret value is unlock-gated. Credential METADATA (id, title, username, url,
timestamps) and ciphertext blobs replicate as PluresDB CRDT nodes (vault-sync,
conflict-free by construction); the PLAINTEXT secret never lives in a replicated
node body and is never logged. The capability is backend-agnostic: a provider MAY
back it with the local vault-crypto store, with Azure Key Vault (vault-akv), or
both (bidirectional sync). Secret material crosses the plugin boundary ONLY through
the mediated, unlock-gated retrieve operation.
"""
# Source of truth this contract is grounded in (for audit / drift tracking):
source_repo = "plures-vault"
source_paths = [
  "crates/vault-core/src/lib.rs",
  "crates/vault-crypto/src/lib.rs",
  "crates/vault-sync/src/lib.rs",
  "crates/vault-graph/src/lib.rs",
  "crates/vault-akv/src/lib.rs",
  "crates/vault-core/src/windows_hello.rs",
]
# Foundation primitives this capability COMPOSES (NOT reinvents):
foundation_reuse = [
  "pluresdb: CrdtStore — credential-metadata + ciphertext NODES (CRDT) + built-in P2P sync (HA/DR via vault-sync)",
  "vault-crypto: Argon2id KDF + AES-256-GCM + zeroize — the at-rest encryption that backs every secret",
  "vault-akv (optional backend): Azure Key Vault mirror — HSM-backed at-rest, proves backend-agnosticism",
  "windows_hello (optional unlock factor, Windows-only): DPAPI/Credential-Locker master-key protection",
]

# ─────────────────────────────────────────────────────────────────────────────
# NODE TYPES — PluresDB node schemas a consumer sees. Namespaced by the consumer's
# pluresdb_namespace at runtime (e.g. <ns>:secrets:*). CRITICAL: the secret value
# is NEVER a field here in plaintext. vault-core stores ciphertext
# (StoredCredential.encrypted_password / encrypted_notes = vault-crypto
# EncryptedData) as the node body; this CID exposes only the metadata a consumer
# may see freely + an opaque ciphertext handle. Plaintext is obtained ONLY via the
# unlock-gated `retrieve` operation. Field types mirror the real vault structs.
# ─────────────────────────────────────────────────────────────────────────────

[[nodes]]
type = "secrets:credential_meta"
maps_to = "vault-core Credential (METADATA ONLY — plaintext password/notes excluded)"
key = "secrets:credential_meta:{id}"
# Grounding: vault-core::Credential {id,title,username,url,created_at,updated_at}.
# The Credential struct ALSO has `password`/`notes` — those are DELIBERATELY NOT
# exposed as node fields. On disk vault-core persists StoredCredential with
# `encrypted_password`/`encrypted_notes` (EncryptedData), surfaced here only as the
# opaque `ciphertext_handle`. (vault-core: add_credential / node_to_credential.)
fields = [
  "id: string",                  # vault-core Credential.id (Uuid)
  "title: string",               # vault-core Credential.title (the credential's name/label)
  "type: enum(credential,group,tag,environment,service)", # vault-graph SecretNodeKind
  "username?: string",           # vault-core Credential.username (NON-secret identifier)
  "url?: string",                # vault-core Credential.url (NON-secret)
  "ciphertext_handle: bytes",    # opaque handle to the AES-256-GCM blob; NEVER the plaintext (vault-crypto EncryptedData)
  "created: timestamp",          # vault-core Credential.created_at
  "rotated: timestamp",          # vault-core Credential.updated_at (advanced on every secret change/rotate)
]

[[nodes]]
type = "secrets:credential_metadata_entry"
maps_to = "vault-core CredentialMetadata (per-credential extra attributes — ENCRYPTED)"
key = "secrets:credential_metadata_entry:{credential_id}:{key}"
# Grounding: vault-core::CredentialMetadata {credential_id,key,value} +
# set_credential_metadata, which ENCRYPTS the value (encrypt_field -> EncryptedData)
# before storing under "meta:{id}:{key}". The `key` (e.g. "2fa_seed") is plaintext;
# the VALUE is ciphertext at rest and is unlock-gated on read (require_master_key).
fields = [
  "credential_id: string",       # vault-core CredentialMetadata.credential_id
  "key: string",                 # vault-core CredentialMetadata.key (attribute name, e.g. 2fa_seed)
  "value_handle: bytes",         # opaque handle to the encrypted value; plaintext only via unlock-gated read
]

[[nodes]]
type = "secrets:vault_state"
maps_to = "vault-core VaultManager lock/unlock state + VaultConfig (NON-secret descriptor)"
key = "secrets:vault_state:{vault_id}"
# Grounding: vault-core VaultConfig {vault_id,version,vault_name,salt,
# key_derivation_params,created_at} (persisted under VAULT_CONFIG_KEY) + the
# in-memory unlocked flag (VaultManager.master_key.is_some() == is_unlocked()).
# `unlocked` is RUNTIME state, never persisted as plaintext key material; `salt` and
# KDF params are public-by-design (Argon2id needs them to re-derive, not the key).
fields = [
  "vault_id: string",            # vault-core VaultConfig.vault_id
  "vault_name: string",          # vault-core VaultConfig.vault_name
  "unlocked: bool",              # runtime: vault-core is_unlocked() (master_key present); NOT the key itself
  "kdf_algorithm: string",       # vault-core KeyDerivationParams.algorithm ("argon2id")
  "kdf_m_cost: u32",             # vault-core KeyDerivationParams.m_cost
  "kdf_t_cost: u32",             # vault-core KeyDerivationParams.t_cost
  "kdf_p_cost: u32",             # vault-core KeyDerivationParams.p_cost
  "salt: string",                # vault-core VaultConfig.salt (public KDF salt; not secret)
  "created: timestamp",          # vault-core VaultConfig.created_at
]

[[nodes]]
type = "secrets:sync_state"
maps_to = "vault-core SyncMetadata (per-credential sync bookkeeping — NON-secret)"
key = "secrets:sync_state:{credential_id}"
# Grounding: vault-core::SyncMetadata {credential_id,last_sync,sync_hash} +
# record_sync_metadata / get_sync_metadata. sync_hash is a content digest used by
# replication/conflict logic (vault-akv full_sync compares hashes); it is NOT a
# secret and contains no plaintext.
fields = [
  "credential_id: string",       # vault-core SyncMetadata.credential_id
  "last_sync: timestamp",        # vault-core SyncMetadata.last_sync
  "sync_hash: string",           # vault-core SyncMetadata.sync_hash (content digest, not secret)
]

[[nodes]]
type = "secrets:relationship"
maps_to = "vault-graph SecretEdge (typed edge between secret nodes)"
key = "secrets:relationship:{source_id}:{target_id}:{relationship}"
deferred = true                  # post-v1: vault-graph SecretGraph is an in-memory graph
                                 # (crates/vault-graph), NOT yet persisted/exposed via
                                 # VaultManager. Present (the type is real) but a v1
                                 # provider is not required to surface it (C-NOSTUB-001).
# Grounding: vault-graph::SecretEdge {source,target,relationship,metadata,created_at}
# with RelationshipType{DependsOn,GroupMember,TaggedWith,DerivedFrom,SharedWith,
# Supersedes,BundledWith}. No secret material — edges relate metadata nodes only.
fields = [
  "source_id: string",           # vault-graph SecretEdge.source (Uuid)
  "target_id: string",           # vault-graph SecretEdge.target (Uuid)
  "relationship: enum(depends_on,group_member,tagged_with,derived_from,shared_with,supersedes,bundled_with)",
  "created: timestamp",          # vault-graph SecretEdge.created_at
]

# ─────────────────────────────────────────────────────────────────────────────
# OPERATIONS — the entry points a consumer triggers. Per ADR-0011 these are
# MEDIATED: a consumer emits the `request` event / writes the request node; the
# provider's reactive procedures service it; the provider emits the `result` event
# the consumer reads. No direct calls. The unlock-gated ops below FAIL with
# E_VAULT_LOCKED if the vault is locked — this mirrors vault-core's
# require_master_key() returning VaultError::VaultNotInitialized when master_key is
# absent (the lock state). `deferred = true` ops cite the missing vault-core method.
# ─────────────────────────────────────────────────────────────────────────────

[[operations]]
name = "unlock"
maps_to = "vault-core VaultManager::unlock_vault"
request_event = "secrets.unlock.requested"
result_event = "secrets.unlock.completed"
# Grounding: vault-core::unlock_vault(master_password) -> verify_password
# (vault-crypto) -> sets master_key. On Windows a provider MAY substitute the
# password factor with Windows Hello (windows_hello::retrieve_master_key); that is
# a provider backend detail, not a separate CID op.
input = [
  "vault_id: string",
  "passphrase: bytes",           # master password material; transient, never stored/logged/replicated
]
output = [
  "unlocked: bool",              # vault-core is_unlocked() after the attempt
  "vault: secrets:vault_state",
]
errors = [
  "E_INVALID_PASSPHRASE",        # vault-core VaultError::InvalidMasterPassword (verify_password failed)
  "E_VAULT_NOT_INITIALIZED",     # vault-core VaultError::VaultNotInitialized (no VaultConfig)
]

[[operations]]
name = "lock"
maps_to = "vault-core VaultManager::lock"
request_event = "secrets.lock.requested"
result_event = "secrets.lock.completed"
# Grounding: vault-core::lock() -> master_key = None. After this, all unlock-gated
# reads fail until the next unlock. Zeroization of key material is provided by
# vault-crypto MasterKey: ZeroizeOnDrop.
input = ["vault_id: string"]
output = ["unlocked: bool"]      # false on success
errors = []

[[operations]]
name = "is_unlocked"
maps_to = "vault-core VaultManager::is_unlocked"
request_event = "secrets.is_unlocked.requested"
result_event = "secrets.is_unlocked.completed"
# Grounding: vault-core::is_unlocked() -> master_key.is_some(). Pure state query;
# returns no secret material.
input = ["vault_id: string"]
output = ["unlocked: bool"]
errors = []

[[operations]]
name = "store"
maps_to = "vault-core VaultManager::add_credential"
request_event = "secrets.store.requested"
result_event = "secrets.store.completed"
# Grounding: vault-core::add_credential(title,username,password,url,notes) ->
# encrypt_field (vault-crypto AES-256-GCM) on password/notes -> persists
# StoredCredential. Requires master_key (require_master_key) => unlock-gated WRITE.
# The plaintext `secret` here is consumed to produce ciphertext and is never
# persisted in clear nor echoed back in the result.
input = [
  "vault_id: string",
  "title: string",               # vault-core add_credential `title` (the credential name)
  "secret: bytes",               # plaintext secret -> encrypted before persist; never stored/logged in clear
  "type?: enum(credential,group,tag,environment,service)", # vault-graph SecretNodeKind (default credential)
  "username?: string",
  "url?: string",
  "notes?: bytes",               # optional secondary secret material; also encrypted at rest
]
output = ["credential: secrets:credential_meta"]   # METADATA only — never the plaintext
errors = [
  "E_VAULT_LOCKED",              # vault-core require_master_key() failed (locked)
  "E_ALREADY_EXISTS",           # vault-core VaultError::CredentialAlreadyExists (duplicate title)
]

[[operations]]
name = "retrieve"
maps_to = "vault-core VaultManager::get_credential / get_credential_by_id"
request_event = "secrets.retrieve.requested"
result_event = "secrets.retrieve.completed"
# Grounding: vault-core::get_credential(title) / get_credential_by_id(id) ->
# require_master_key() (UNLOCK GATE) -> node_to_credential -> decrypt_field
# (vault-crypto) -> returns plaintext Credential.password/notes. THIS is the ONLY
# operation that returns plaintext secret material across the boundary, and it is
# unlock-gated. The result MUST NOT be logged or written into any replicated node
# (see [invariants] secrets_never_in_node_body / secrets_never_logged).
input = [
  "vault_id: string",
  "id?: string",                 # by-id path (get_credential_by_id)
  "title?: string",              # by-title path (get_credential); one of id/title required
]
output = [
  "secret: bytes",               # DECRYPTED plaintext — transient, mediated, unlock-gated; the sensitive crossing
  "notes?: bytes",               # decrypted secondary material if present
  "credential: secrets:credential_meta",
]
errors = [
  "E_VAULT_LOCKED",              # vault-core require_master_key() failed (locked) — plaintext is NOT returned
  "E_NOT_FOUND",                 # vault-core VaultError::CredentialNotFound / Ok(None)
]

[[operations]]
name = "list_metadata"
maps_to = "vault-core VaultManager::list_credentials (metadata projection)"
request_event = "secrets.list_metadata.requested"
result_event = "secrets.list_metadata.completed"
# Grounding: vault-core::list_credentials() -> require_master_key() then returns
# Credentials sorted by title. THIS CID PROJECTS OUT the plaintext: a conforming
# provider returns credential_meta (id/title/type/username/url/timestamps + handle)
# and MUST strip password/notes. (Unlock-gated because vault-core requires the key
# to enumerate; a locked metadata-only listing is a post-v1 refinement, deferred.)
input = ["vault_id: string"]
output = ["credentials: list<secrets:credential_meta>"]   # metadata only — never plaintext
errors = ["E_VAULT_LOCKED"]      # vault-core require_master_key() failed (locked)

[[operations]]
name = "set_metadata"
maps_to = "vault-core VaultManager::set_credential_metadata"
request_event = "secrets.set_metadata.requested"
result_event = "secrets.set_metadata.completed"
# Grounding: vault-core::set_credential_metadata(credential_id,key,value) ->
# encrypt_field on the value -> stores "meta:{id}:{key}". Unlock-gated
# (require_master_key). Upsert semantics (same key overwrites).
input = [
  "vault_id: string",
  "credential_id: string",
  "key: string",                 # attribute name (plaintext), e.g. 2fa_seed
  "value: bytes",                # encrypted before persist; never stored/logged in clear
]
output = ["entry: secrets:credential_metadata_entry"]   # value surfaced only as a handle
errors = ["E_VAULT_LOCKED"]

[[operations]]
name = "get_metadata"
maps_to = "vault-core VaultManager::get_credential_metadata"
request_event = "secrets.get_metadata.requested"
result_event = "secrets.get_metadata.completed"
# Grounding: vault-core::get_credential_metadata(credential_id) ->
# require_master_key() -> decrypts each value -> returns CredentialMetadata list.
# Unlock-gated: returns plaintext metadata VALUES, so it is as sensitive as
# `retrieve` and is bound by the same secrets_never_logged invariant.
input = ["vault_id: string", "credential_id: string"]
output = ["entries: list<{ key: string, value: bytes }>"]  # decrypted values — transient, unlock-gated
errors = ["E_VAULT_LOCKED"]

[[operations]]
name = "delete_metadata"
maps_to = "vault-core VaultManager::delete_credential_metadata"
request_event = "secrets.delete_metadata.requested"
result_event = "secrets.delete_metadata.completed"
# Grounding: vault-core::delete_credential_metadata(credential_id,key) -> deletes
# "meta:{id}:{key}". Returns whether an entry existed.
input = ["vault_id: string", "credential_id: string", "key: string"]
output = ["deleted: bool"]
errors = []

[[operations]]
name = "update"
maps_to = "vault-core VaultManager::update_credential / update_credential_by_id"
request_event = "secrets.update.requested"
result_event = "secrets.update.completed"
# Grounding: vault-core::update_credential(title, new_username, new_password,
# new_url, new_notes) (and _by_id, which additionally allows new_title) ->
# re-encrypts changed secret fields (store_credential -> encrypt_field) and bumps
# updated_at. Unlock-gated (require_master_key). Passing a new `secret`/`notes` is
# how a credential's secret material is changed in place.
input = [
  "vault_id: string",
  "id?: string",                 # by-id path (update_credential_by_id)
  "title?: string",              # by-title selector (update_credential), or new_title on the by-id path
  "new_title?: string",          # vault-core update_credential_by_id new_title (rename)
  "secret?: bytes",              # new plaintext secret -> re-encrypted; never stored/logged in clear
  "username?: string",
  "url?: string",
  "notes?: bytes",
]
output = ["credential: secrets:credential_meta"]   # updated METADATA — never plaintext
errors = [
  "E_VAULT_LOCKED",              # vault-core require_master_key() failed (locked)
  "E_NOT_FOUND",                 # vault-core returned Ok(None) (no such credential)
]

[[operations]]
name = "delete"
maps_to = "vault-core VaultManager::delete_credential / delete_credential_by_id"
request_event = "secrets.delete.requested"
result_event = "secrets.delete.completed"
# Grounding: vault-core::delete_credential(title) / delete_credential_by_id(id) ->
# delete_related_data (cascades the credential's metadata + sync nodes) then deletes
# the credential node. Returns whether it existed. NOTE: delete is NOT gated by
# require_master_key in vault-core (it removes ciphertext without decrypting); the
# provider SHOULD still authorize the caller, but the CID does not claim an unlock
# gate that the implementation does not enforce.
input = [
  "vault_id: string",
  "id?: string",                 # by-id path (delete_credential_by_id)
  "title?: string",              # by-title path (delete_credential)
]
output = ["deleted: bool"]       # cascades metadata + sync (vault-core delete_related_data)
errors = []

[[operations]]
name = "record_sync"
maps_to = "vault-core VaultManager::record_sync_metadata"
request_event = "secrets.record_sync.requested"
result_event = "secrets.record_sync.completed"
# Grounding: vault-core::record_sync_metadata(credential_id, sync_hash) -> writes a
# SyncMetadata node (last_sync=now). NOT unlock-gated (bookkeeping over a content
# digest, no plaintext). vault-akv full_sync / vault-sync drive this in practice.
input = ["vault_id: string", "credential_id: string", "sync_hash: string"]
output = ["sync: secrets:sync_state"]
errors = []

[[operations]]
name = "rotate"
maps_to = "rotate a credential's secret (atomic: new secret + rotated timestamp + sync bump)"
deferred = true                  # NO dedicated vault-core rotate method exists today.
                                 # Rotation is currently DONE via `update` (new secret ->
                                 # re-encrypt + updated_at bump). A first-class `rotate`
                                 # (old-secret retention window, rotation policy, atomic
                                 # re-encrypt-under-new-DEK) is post-v1. Marked deferred
                                 # rather than aliased to update so the contract does not
                                 # over-claim a capability vault-core lacks (C-NOSTUB-001).
request_event = "secrets.rotate.requested"
result_event = "secrets.rotate.completed"
input = [
  "vault_id: string",
  "id?: string",
  "title?: string",
  "new_secret: bytes",           # plaintext of the new secret; re-encrypted, old value retired
]
output = [
  "credential: secrets:credential_meta",   # rotated timestamp advanced
  "rotated: timestamp",
]
errors = ["E_VAULT_LOCKED", "E_NOT_FOUND"]

[[operations]]
name = "link"
maps_to = "vault-graph add_edge (relate two secret nodes)"
deferred = true                  # post-v1: vault-graph SecretGraph::add_edge exists in
                                 # crates/vault-graph but is an in-memory graph not yet
                                 # persisted/exposed through VaultManager. Present, not
                                 # required of a v1 provider (C-NOSTUB-001).
request_event = "secrets.link.requested"
result_event = "secrets.link.completed"
# Grounding: vault-graph::SecretGraph + SecretEdge / RelationshipType. Edges relate
# metadata nodes only (no secret material). Cycle/self-reference rejection is a real
# graph property (vault-graph GraphError::CycleDetected / SelfReference).
input = [
  "vault_id: string",
  "source_id: string",
  "target_id: string",
  "relationship: enum(depends_on,group_member,tagged_with,derived_from,shared_with,supersedes,bundled_with)",
]
output = ["relationship: secrets:relationship"]
errors = [
  "E_DUPLICATE_EDGE",            # vault-graph GraphError::DuplicateEdge
  "E_CYCLE",                     # vault-graph GraphError::CycleDetected
  "E_SELF_REFERENCE",            # vault-graph GraphError::SelfReference
]

# ─────────────────────────────────────────────────────────────────────────────
# EVENTS — the full mediated event vocabulary. Request/result pairs above, PLUS
# provider-emitted NOTIFICATION events. The lifecycle/CRDT notifications below are
# grounded in vault-sync::VaultSyncEvent (PeerConnected/PeerDisconnected/
# CredentialSynced/SyncError) and the unlock/lock state transitions. Deferred ops'
# events are listed but a v1 provider is not required to emit them (C-NOSTUB-001).
# ─────────────────────────────────────────────────────────────────────────────
[events]
emitted_by_consumer = [
  "secrets.unlock.requested",
  "secrets.lock.requested",
  "secrets.is_unlocked.requested",
  "secrets.store.requested",
  "secrets.retrieve.requested",
  "secrets.list_metadata.requested",
  "secrets.set_metadata.requested",
  "secrets.get_metadata.requested",
  "secrets.delete_metadata.requested",
  "secrets.update.requested",
  "secrets.delete.requested",
  "secrets.record_sync.requested",
  "secrets.rotate.requested",       # deferred
  "secrets.link.requested",         # deferred
]
emitted_by_provider = [
  # result events (paired with the requests above)
  "secrets.unlock.completed",
  "secrets.lock.completed",
  "secrets.is_unlocked.completed",
  "secrets.store.completed",
  "secrets.retrieve.completed",
  "secrets.list_metadata.completed",
  "secrets.set_metadata.completed",
  "secrets.get_metadata.completed",
  "secrets.delete_metadata.completed",
  "secrets.update.completed",
  "secrets.delete.completed",
  "secrets.record_sync.completed",
  "secrets.rotate.completed",       # deferred
  "secrets.link.completed",         # deferred
  # notification events (the secret-store activity stream)
  "secrets.unlocked",               # vault transitioned locked -> unlocked (is_unlocked() true)
  "secrets.locked",                 # vault transitioned unlocked -> locked (lock() / timeout)
  "secrets.credential.stored",      # a credential was added (add_credential)
  "secrets.credential.updated",     # a credential's fields changed (update_credential)
  "secrets.credential.rotated",     # a credential's secret material was rotated (deferred path)
  "secrets.credential.deleted",     # a credential (+ cascaded metadata/sync) was removed
  "secrets.credential.synced",      # vault-sync VaultSyncEvent::CredentialSynced (CRDT node replicated)
  "secrets.sync.peer_connected",    # vault-sync VaultSyncEvent::PeerConnected
  "secrets.sync.peer_disconnected", # vault-sync VaultSyncEvent::PeerDisconnected
  "secrets.sync.error",             # vault-sync VaultSyncEvent::SyncError
]

# ─────────────────────────────────────────────────────────────────────────────
# TRANSPORT — how this capability is reached and replicated. Unlike git-repo (which
# needs a streaming packfile transport), secrets is request/response + CRDT node
# replication — both ALREADY supported by radix's IO-actor model + PluresDB sync
# (vault-sync). There is no missing host transport capability here.
# ─────────────────────────────────────────────────────────────────────────────
[transport]
v1 = ["mediated-events"]              # request/result over the plugin boundary (ADR-0011)
replication = "pluresdb-crdt"         # metadata + ciphertext nodes replicate P2P (vault-sync GUN relay)
streaming = false                     # no streaming payloads; secret values are small, fetched on demand
backends = ["local-vault-crypto", "azure-key-vault"]  # provider-selectable (vault-crypto | vault-akv)
unlock_factors = ["passphrase", "windows-hello"]      # windows-hello Windows-only, graceful fallback to passphrase
requires_host_capability = "none"     # request/response + CRDT sync already exist (contrast git-repo streaming gap)

# ─────────────────────────────────────────────────────────────────────────────
# INVARIANTS — contract guarantees a conforming provider MUST uphold. These are
# the zero-trust posture restated as obligations and grounded in what vault-crypto
# / vault-core actually enforce. THEY ARE ERRORS, NOT SUGGESTIONS: a provider that
# violates plaintext-never-replicated / retrieve-is-unlock-gated / secrets-never-
# logged is NON-CONFORMING and MUST be rejected at install / fail the gate.
# ─────────────────────────────────────────────────────────────────────────────
[invariants]
rules = [
  "secrets_encrypted_at_rest: every secret value (credential password/notes and every credential_metadata value) is encrypted before it is persisted — AES-256-GCM under an Argon2id-derived master key (vault-crypto encrypt / EncryptedData). A provider MUST NOT write a secret value to durable storage in plaintext. Verified in vault-core by test_password_and_notes_are_encrypted_at_rest (raw node bytes contain no plaintext).",
  "secrets_never_in_node_body: the PLAINTEXT secret value is NEVER a field of any replicated CRDT node. Replicated nodes carry only metadata + opaque ciphertext handles (credential_meta.ciphertext_handle, credential_metadata_entry.value_handle). The plaintext exists ONLY transiently in memory inside an unlock-gated retrieve/get_metadata result and is never placed in a node that vault-sync replicates.",
  "retrieve_is_unlock_gated: a secret value crosses the plugin boundary ONLY through the `retrieve` (and `get_metadata`) operation, and ONLY while the vault is unlocked. With the vault locked, vault-core require_master_key() fails and the operation returns E_VAULT_LOCKED WITHOUT returning any plaintext. No other operation returns plaintext secret material. Enforced in vault-core by test_locked_vault_denies_credential_access.",
  "secrets_never_logged: a conforming provider MUST NOT log, trace, emit in an error message, or otherwise side-channel a decrypted secret value or the master key/passphrase. Notification events carry metadata (ids, titles, timestamps) only — never the secret. (vault-akv logs only a truncated CONTENT HASH prefix, never the value; providers MUST follow that discipline.)",
  "master_key_only_while_unlocked: the master key is held in memory ONLY between unlock and lock; lock() drops it (master_key = None) and the key type zeroizes on drop (vault-crypto MasterKey: ZeroizeOnDrop). The key itself is NEVER persisted or replicated; only the public Argon2id salt + KDF params are stored (VaultConfig), from which the key cannot be derived without the passphrase.",
  "wrong_passphrase_reveals_nothing: an unlock attempt with an incorrect passphrase fails (E_INVALID_PASSPHRASE) and grants no access to any secret — verify_password rejects before any master_key is set (vault-crypto verify_password; vault-core test_unlock_vault_wrong_password).",
  "backend_agnostic_same_guarantees: the secret-management guarantees hold regardless of backend — local vault-crypto (AES-256-GCM at rest) or Azure Key Vault (HSM-backed at rest, vault-akv). A provider MAY sync between backends, but plaintext is never written to a replicated PluresDB node body in either case; AKV stores the encrypted/managed secret on the Azure side, not in the CRDT graph.",
  "replication_is_conflict_free: credential-metadata, ciphertext, and sync-state nodes replicate via PluresDB CRDTs (vector clocks / causal order, vault-sync) — concurrent edits converge with no manual conflict resolution at the node layer; secret CIPHERTEXT is opaque to the merge (only metadata fields merge field-wise).",
  "delete_cascades: deleting a credential removes its dependent metadata and sync nodes (vault-core delete_related_data) so no orphaned ciphertext handle or stale sync record is left behind.",
  "mediated_boundary_only: a consumer NEVER holds a direct function reference into the provider; all interaction is the request/result events + nodes above (ADR-0011). The provider is the sole writer of secrets:* nodes; consumers read metadata and drive operations via events.",
  "deferred_surface_is_honest: rotate, link, and the relationship node are marked deferred because the backing surface is absent or not yet exposed via VaultManager (no first-class rotate method; vault-graph is in-memory only). A v1 provider performs secret change-in-place via `update` and reports rotate/link as NOT-YET-BUILT rather than faking them (C-NOSTUB-001).",
]
