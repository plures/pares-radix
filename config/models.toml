# Model Pool Configuration
# ========================
# Source of truth at startup. Works without PluresDB.
# Runtime changes (via /model command) sync back here.
#
# Models are enabled by default. Disable ones you don't want.
# The orchestrator dynamically selects the best model per task.
#
# Cost is per 1M tokens (USD). Copilot cost is $0 (subscription).
# Cost data sourced from OpenClaw model catalogs (2026-06-14).

[pool]
default_provider = "copilot"

[pool.selection_weights]
capability = 0.35
rsi = 0.30
cost = 0.20
speed = 0.15

# ─── Providers ────────────────────────────────────────────────────────

[providers.copilot]
kind = "github-copilot"
endpoint = "https://api.individual.githubcopilot.com"
auth = "gh-token"
api = "openai-responses"        # default; claude models use anthropic-messages
discovery = "refreshable"       # live discovery from /models endpoint
enabled = true

[providers.openai]
kind = "openai"
endpoint = "https://api.openai.com/v1"
auth = "env:OPENAI_API_KEY"
api = "openai-responses"
discovery = "static"
enabled = false                 # enable when API key is configured

[providers.anthropic]
kind = "anthropic"
endpoint = "https://api.anthropic.com"
auth = "env:ANTHROPIC_API_KEY"
api = "anthropic-messages"
discovery = "static"
enabled = false                 # enable when API key is configured

[providers.local]
kind = "ollama"
endpoint = "http://localhost:11434"
api = "openai-completions"
discovery = "refreshable"       # GET /api/tags
enabled = false

# ─── Models: GitHub Copilot (subscription, $0 per-token cost) ─────────
# Context windows from Copilot API; cost = 0 (flat rate subscription)

[[models]]
id = "claude-opus-4.8"
provider = "copilot"
vendor = "Anthropic"
name = "Claude Opus 4.8"
api = "anthropic-messages"
category = "powerful"
context_window = 1_000_000
max_output = 64_000
input = ["text", "image"]
reasoning = true
reasoning_levels = ["low", "medium", "high", "xhigh", "max"]
cost = { input = 0, output = 0, cache_read = 0 }
enabled = true

