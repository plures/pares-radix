# Model Pool Configuration
# ========================
# Human-readable, editable, works without PluresDB.
# This file is the source of truth at startup.
# Runtime changes (via /model command) sync back here.
#
# Models are enabled by default. Disable ones you don't want.
# The orchestrator dynamically selects the best model per task.

[pool]
default_provider = "copilot"

[pool.selection_weights]
capability = 0.35
rsi = 0.30
cost = 0.20
speed = 0.15

# ─── Providers ────────────────────────────────────────────────────────

[providers.copilot]
kind = "github-copilot"
endpoint = "https://api.githubcopilot.com"
auth = "gh-token"
auto_discover = true
enabled = true

[providers.openai-direct]
kind = "openai"
endpoint = "https://api.openai.com/v1"
auth = "env:OPENAI_API_KEY"
auto_discover = true
enabled = false

[providers.local]
kind = "ollama"
endpoint = "http://localhost:11434"
auto_discover = true
enabled = false

# ─── Models ───────────────────────────────────────────────────────────
# Auto-populated from provider discovery + manual overrides.
# Set enabled = false to disable a model from selection.

# --- Anthropic (via Copilot) ---

[[models]]
id = "claude-opus-4.8"
provider = "copilot"
vendor = "Anthropic"
category = "powerful"
context_window = 1_000_000
max_output = 64_000
capabilities = ["reasoning", "code", "vision", "tools", "streaming"]
reasoning_levels = ["low", "medium", "high", "xhigh", "max"]
enabled = true

