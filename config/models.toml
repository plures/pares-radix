# Model Pool Configuration
# ========================
# Source of truth at startup. Works without PluresDB.
# Runtime changes (via /model command) sync back here.
#
# Models are discovered dynamically from providers, NOT hardcoded.
# This file defines providers + user overrides (enable/disable/preferences).
# The model catalog is populated at runtime via provider discovery.
#
# Cost is per 1M tokens (USD). Copilot cost is $0 (subscription).

[pool]
default_provider = "copilot"

[pool.selection_weights]
capability = 0.35
rsi = 0.30
cost = 0.20
speed = 0.15

[pool.discovery]
# How often to refresh model lists from providers (seconds)
refresh_interval = 3600         # 1 hour
refresh_on_startup = true       # always discover on boot

# ─── Providers ────────────────────────────────────────────────────────
# Each provider is queried for its available models at startup
# and periodically thereafter. No hardcoded model lists.

[providers.copilot]
kind = "github-copilot"
endpoint = "https://api.individual.githubcopilot.com"
auth = "gh-token"               # uses `gh auth token`
api = "openai-responses"        # default; claude models override to anthropic-messages
discovery = "refreshable"       # GET /models
enabled = true

[providers.openai]
kind = "openai"
endpoint = "https://api.openai.com/v1"
auth = "env:OPENAI_API_KEY"
api = "openai-responses"
discovery = "refreshable"       # GET /v1/models
enabled = false                 # enable when API key is configured

[providers.anthropic]
kind = "anthropic"
endpoint = "https://api.anthropic.com"
auth = "env:ANTHROPIC_API_KEY"
api = "anthropic-messages"
discovery = "refreshable"       # known models list from API
enabled = false                 # enable when API key is configured

[providers.local]
kind = "ollama"
endpoint = "http://localhost:11434"
api = "openai-completions"
discovery = "refreshable"       # GET /api/tags
enabled = false

# ─── User Model Overrides ─────────────────────────────────────────────
# Models are discovered dynamically from providers.
# Use this section ONLY for user overrides (disable/enable/prefer).
# Format: [[models.overrides]]
#
# The orchestrator discovers all models from enabled providers at startup.
# These overrides are applied AFTER discovery.

[[models.overrides]]
id = "gpt-4o"
provider = "copilot"
enabled = false
reason = "superseded by gpt-4.1"

[[models.overrides]]
id = "gpt-4o-mini"
provider = "copilot"
enabled = false
reason = "superseded by gpt-5-mini"

[[models.overrides]]
id = "gpt-3.5-turbo"
provider = "copilot"
enabled = false
reason = "legacy"

# Example: disable a model that gives bad results
# [[models.overrides]]
# id = "gpt-5.4-nano"
# provider = "openai"
# enabled = false
# reason = "too dumb for our use case"

# Example: prefer a model (soft boost to selection score)
# [[models.overrides]]
# id = "claude-opus-4.8"
# provider = "copilot"
# prefer = true

# ─── Cost Overrides ───────────────────────────────────────────────────
# Provider-level cost info. Only needed when providers don't report it
# or when you want to override (e.g., enterprise pricing differs).
# Cost = USD per 1M tokens. Copilot is always $0 (subscription).

[costs]
# Copilot is free (subscription), so no per-token cost
copilot = "subscription"        # signals $0 per-token to the selection algorithm

# OpenAI/Anthropic costs are discovered from provider metadata when available.
# Override here only if your contract pricing differs from public rates.
# [costs.overrides."openai/gpt-5.5"]
# input = 4.0   # your enterprise rate
# output = 25.0

# ─── Discovery Cache ──────────────────────────────────────────────────
# Last successful discovery results are cached here by the runtime.
# This section is auto-managed. DO NOT edit manually.
# It ensures the system works if providers are temporarily unreachable.
#
# [discovery_cache]
# last_refresh = "2026-06-14T18:30:00Z"
# copilot_models = 14
# openai_models = 0   (provider disabled)
# anthropic_models = 0 (provider disabled)
