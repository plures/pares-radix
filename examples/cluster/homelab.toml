# Homelab cluster example with multi-mode discovery.

[discovery]

[[discovery.direct]]
address = "praxisbot.local"
port = 7700

[[discovery.direct]]
address = "10.0.0.5"
port = 7700

[discovery.lan]
enabled = true
multicast_group = "239.255.77.77"
port = 7700

[discovery.hyperswarm]
enabled = false
topic_key = ""

[[node_requirement]]
name = "minimum_nodes"
count_check = ">= 2"
error = "Homelab cluster requires at least 2 healthy nodes"

[[workload]]
name = "pluresdb-peer"
image = "nixos#pluresdb"
replicas = "all"
placement = "everywhere"

[workload.resources]
cpu = 1.0
memory = "2G"

[workload.health]
protocol = "tcp"
target = "tcp://localhost:3100"
interval_secs = 10
