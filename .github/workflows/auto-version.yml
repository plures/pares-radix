name: Auto Version Bump
on:
  push:
    branches: [main]
    paths-ignore: ['**.md', 'docs/**', '.github/**']

jobs:
  bump:
    runs-on: ubuntu-latest
    if: "!contains(github.event.head_commit.message, '[skip ci]')"
    permissions:
      contents: write
      actions: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Determine next version
        id: version
        run: |
          set -euo pipefail

          VERSION=$(grep '^version' Cargo.toml | head -1 | sed 's/.*"\(.*\)"/\1/' | tr -d '\r\n')
          echo "Cargo.toml version: $VERSION"

          # Find the highest existing semver tag to prevent version regression
          HIGHEST_TAG=$(git tag -l 'v[0-9]*.[0-9]*.[0-9]*' | sed 's/^v//' | sort -t. -k1,1n -k2,2n -k3,3n | tail -1 | tr -d '\r\n')
          echo "Highest tag: v${HIGHEST_TAG:-none}"

          if [ -n "$HIGHEST_TAG" ]; then
            H_MAJOR=$(echo "$HIGHEST_TAG" | cut -d. -f1)
            H_MINOR=$(echo "$HIGHEST_TAG" | cut -d. -f2)
            H_PATCH=$(echo "$HIGHEST_TAG" | cut -d. -f3 | grep -oE '^[0-9]+')
          else
            H_MAJOR=0; H_MINOR=0; H_PATCH=0
          fi

          C_MAJOR=$(echo "$VERSION" | cut -d. -f1)
          C_MINOR=$(echo "$VERSION" | cut -d. -f2)
          C_PATCH=$(echo "$VERSION" | cut -d. -f3 | grep -oE '^[0-9]+')

          # Default to 0 if any field is empty
          H_MAJOR=${H_MAJOR:-0}; H_MINOR=${H_MINOR:-0}; H_PATCH=${H_PATCH:-0}
          C_MAJOR=${C_MAJOR:-0}; C_MINOR=${C_MINOR:-0}; C_PATCH=${C_PATCH:-0}

          echo "Parsed highest tag: $H_MAJOR.$H_MINOR.$H_PATCH"
          echo "Parsed Cargo.toml:  $C_MAJOR.$C_MINOR.$C_PATCH"

          # Use whichever is higher: Cargo.toml version or highest tag
          if [ "$H_MAJOR" -gt "$C_MAJOR" ] || \
             ([ "$H_MAJOR" -eq "$C_MAJOR" ] && [ "$H_MINOR" -gt "$C_MINOR" ]) || \
             ([ "$H_MAJOR" -eq "$C_MAJOR" ] && [ "$H_MINOR" -eq "$C_MINOR" ] && [ "$H_PATCH" -gt "$C_PATCH" ]); then
            BASE_MAJOR=$H_MAJOR; BASE_MINOR=$H_MINOR; BASE_PATCH=$H_PATCH
          else
            BASE_MAJOR=$C_MAJOR; BASE_MINOR=$C_MINOR; BASE_PATCH=$C_PATCH
          fi

          NEW_PATCH=$((BASE_PATCH + 1))
          NEW_VERSION="${BASE_MAJOR}.${BASE_MINOR}.${NEW_PATCH}"

          # Safety: skip if this version tag already exists
          if git tag -l "v$NEW_VERSION" | grep -q .; then
            echo "Tag v$NEW_VERSION already exists, incrementing further"
            NEW_PATCH=$((NEW_PATCH + 1))
            NEW_VERSION="${BASE_MAJOR}.${BASE_MINOR}.${NEW_PATCH}"
          fi

          echo "Will bump: $VERSION -> $NEW_VERSION"
          sed -i "s/^version = \"$VERSION\"/version = \"$NEW_VERSION\"/" Cargo.toml
          echo "NEW_VERSION=$NEW_VERSION" >> $GITHUB_ENV
          echo "new_version=$NEW_VERSION" >> $GITHUB_OUTPUT

      - name: Commit and tag
        id: push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add Cargo.toml
          if git diff --cached --quiet; then
            echo "No version change needed"
            echo "pushed=false" >> $GITHUB_OUTPUT
            exit 0
          fi
          git commit -m "chore: bump version to v$NEW_VERSION [skip ci]"
          git tag "v$NEW_VERSION"
          git push --follow-tags
          echo "pushed=true" >> $GITHUB_OUTPUT

      - name: Trigger release workflow
        if: steps.push.outputs.pushed == 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh workflow run release.yml --ref main -f target_version="$NEW_VERSION"
