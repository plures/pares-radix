name: CI Feedback Loop

on:
  push:
    branches: [main]

permissions:
  contents: read
  issues: write

jobs:
  ci-feedback:
    name: Post-Merge CI Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 'lts/*'
      - run: npm ci || npm install
        continue-on-error: true

      - name: Lint
        run: npm run lint --if-present 2>&1
        continue-on-error: true
        id: lint

      - name: Type check
        run: npx svelte-kit sync && npx tsc --noEmit --skipLibCheck 2>&1
        continue-on-error: true
        id: typecheck

      - name: Test
        run: npm test --if-present 2>&1
        continue-on-error: true
        id: test

      - name: Create issue on failure
        if: steps.lint.outcome == 'failure' || steps.typecheck.outcome == 'failure' || steps.test.outcome == 'failure'
        uses: actions/github-script@v7
        env:
          LINT_OUTCOME: ${{ steps.lint.outcome }}
          TYPECHECK_OUTCOME: ${{ steps.typecheck.outcome }}
          TEST_OUTCOME: ${{ steps.test.outcome }}
          COMMIT_SHA: ${{ github.sha }}
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const owner = context.repo.owner;
            const repo = context.repo.repo;
            const sha = process.env.COMMIT_SHA.slice(0, 7);
            const steps = {
              lint: process.env.LINT_OUTCOME,
              typecheck: process.env.TYPECHECK_OUTCOME,
              test: process.env.TEST_OUTCOME
            };
            const failures = Object.entries(steps)
              .filter(([_, o]) => o === 'failure')
              .map(([n]) => n);
            if (failures.length === 0) return;

            const existing = await github.rest.issues.listForRepo({
              owner, repo, state: 'open', labels: 'ci-failure', per_page: 20
            });
            const already = existing.data.some(i => i.title.includes(sha));
            if (already) return;

            await github.rest.issues.create({
              owner, repo,
              title: `[ci-feedback] Post-merge CI failure at ${sha}`,
              body: `CI failed after merge to main at commit ${sha}.\n\nFailing steps: ${failures.join(', ')}\n\n@copilot Please fix these failures.`,
              labels: ['ci-failure', 'bug']
            });
