name: CI
on:
  push:
    branches: [main, "copilot/**", "feature/**", "refactor/**", "fix/**"]
    paths:
      - 'crates/**'
      - 'src/**'
      - 'praxis/**'
      - 'Cargo.toml'
      - 'Cargo.lock'
      - 'package.json'
      - 'pnpm-lock.yaml'
      - '.github/workflows/ci.yml'
      - '.github/workflows/ci-reusable.yml'
  pull_request:
    paths:
      - 'crates/**'
      - 'src/**'
      - 'praxis/**'
      - 'Cargo.toml'
      - 'Cargo.lock'
      - 'package.json'
      - 'pnpm-lock.yaml'
      - '.github/workflows/ci.yml'
      - '.github/workflows/ci-reusable.yml'
  workflow_dispatch:
permissions:
  contents: read
jobs:
  ci:
    uses: plures/.github/.github/workflows/ci-reusable.yml@main
    with:
      extra_apt_packages: 'libglib2.0-dev libwebkit2gtk-4.1-dev libgtk-3-dev libayatana-appindicator3-dev librsvg2-dev'
      cargo_clippy_flags: '--workspace --all-targets --exclude pares-radix-app -- -D warnings'
      cargo_test_flags: '--workspace --exclude pares-radix-app'
