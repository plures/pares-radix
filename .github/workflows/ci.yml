name: CI
on:
  push:
    branches: [main, "copilot/**", "feature/**"]
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm
        if: hashFiles('package-lock.json') != ''
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
        if: hashFiles('package-lock.json') == ''

      - run: npm ci
        if: hashFiles('package-lock.json') != ''
      - run: npm install
        if: hashFiles('package-lock.json') == ''

      - name: Lint
        run: npm run lint --if-present

      - name: Type check
        run: npx svelte-kit sync && npx tsc --noEmit --skipLibCheck || echo "Typecheck skipped or failed (no tsconfig or svelte-kit sync error)"

      - name: Test
        run: npm test --if-present

      - name: Build
        run: npm run build --if-present
