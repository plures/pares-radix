name: Copilot Issue Queue Manager
on:
  pull_request:
    types: [closed]
  workflow_dispatch:
    inputs:
      force:
        description: "Force assign even if Copilot has open PR"
        type: boolean
        default: false
  schedule:
    - cron: '0 */2 * * *'

permissions:
  contents: read
  issues: write
  pull-requests: read

jobs:
  queue:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/create-github-app-token@v1
        id: app-token
        with:
          app-id: 3158960
          private-key: ${{ secrets.PRAXIS_BOT_PRIVATE_KEY }}
      - uses: actions/github-script@v7
        with:
          github-token: ${{ steps.app-token.outputs.token }}
          script: |
            const owner = context.repo.owner;
            const repo = context.repo.repo;
            const force = context.payload.inputs?.force === 'true';
            const COPILOT_BOT_ID = 'BOT_kgDOC9w8XQ';
            const SKIP_LABELS = new Set(['ci-feedback', 'expectation-violation', 'wontfix', 'duplicate', 'copilot-queued']);

            // Check for open Copilot PR
            const prs = await github.rest.pulls.list({ owner, repo, state: 'open', per_page: 100 });
            const copilotPR = prs.data.find(pr =>
              ['Copilot', 'copilot-swe-agent[bot]', 'app/copilot-swe-agent'].includes(pr.user.login)
            );
            if (copilotPR && !force) {
              core.info(`Copilot has open PR #${copilotPR.number} — waiting`);
              return;
            }

            // Find all open issues
            const allIssues = await github.rest.issues.listForRepo({
              owner, repo, state: 'open', per_page: 100, sort: 'created', direction: 'asc',
            });
            const issues = allIssues.data.filter(i => !i.pull_request);

            // Check if Copilot is already assigned to something
            const copilotIssue = issues.find(i => i.assignees.some(a => a.login === 'Copilot'));

            if (copilotIssue) {
              // Already assigned — check if it failed and needs a nudge
              const comments = await github.rest.issues.listComments({
                owner, repo, issue_number: copilotIssue.number,
                per_page: 5, direction: 'desc',
              });

              const lastComment = comments.data[0];
              if (!lastComment) return;

              const isCopilotFailure = lastComment.user.login === 'Copilot' &&
                lastComment.body.includes('temporarily unavailable');
              const isOurNudge = lastComment.body.includes('@copilot') &&
                lastComment.user.login !== 'Copilot';

              // If last comment is a failure, nudge
              // If last comment is already our nudge, check age — re-nudge after 30 min
              if (isCopilotFailure) {
                core.info(`Copilot failed on #${copilotIssue.number} — nudging`);
                await github.rest.issues.createComment({
                  owner, repo, issue_number: copilotIssue.number,
                  body: '@copilot Please retry this issue.',
                });
                return;
              }

              if (isOurNudge) {
                const nudgeAge = Date.now() - new Date(lastComment.created_at).getTime();
                if (nudgeAge > 30 * 60 * 1000) {
                  core.info(`Last nudge was ${Math.round(nudgeAge/60000)}min ago — re-nudging #${copilotIssue.number}`);
                  await github.rest.issues.createComment({
                    owner, repo, issue_number: copilotIssue.number,
                    body: '@copilot Please retry this issue.',
                  });
                }
                return;
              }

              core.info(`Copilot assigned to #${copilotIssue.number} — no action needed`);
              return;
            }

            // No Copilot assignment — find next issue
            const candidates = issues.filter(i => {
              if (i.labels.some(l => SKIP_LABELS.has(l.name))) return false;
              if (!i.milestone) return false;
              return true;
            });

            candidates.sort((a, b) => {
              if (a.milestone.number !== b.milestone.number)
                return a.milestone.number - b.milestone.number;
              return a.number - b.number;
            });

            if (candidates.length === 0) {
              core.info('No eligible issues');
              return;
            }

            const target = candidates[0];
            core.info(`Assigning Copilot to #${target.number}: ${target.title}`);

            try {
              await github.graphql(`mutation($id:ID!){
                addAssigneesToAssignable(input:{assignableId:$id,assigneeIds:["${COPILOT_BOT_ID}"]}){clientMutationId}
              }`, { id: target.node_id });
            } catch (e) {
              core.warning(`GraphQL assign failed: ${e.message}`);
            }

            await github.rest.issues.createComment({
              owner, repo, issue_number: target.number,
              body: '@copilot Please implement this issue now. Build against current main branch.',
            });
            core.info(`✅ Assigned and nudged #${target.number}`);
