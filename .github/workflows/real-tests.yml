# CI: Real Integration Tests for pares-radix
#
# pares-radix is a svelte-Tauri app: GUI + Svelte-TUI (tui-css) + svelte-ratatui
# (tui-native) + MCP. There is NO traditional CLI binary. This workflow tests the
# REAL runnable surfaces only — no mocks, no stubs, no ghost `pares-radix --version`.
#
# Tiers:
#   1. mcp        — the MCP dev server's native interface: vitest + stdio JSON-RPC smoke
#   2. workspace  — Rust workspace builds (cargo build --release): app lib + crates compile
#   3. frontend   — Svelte render-mode / tui-mappings + platform/store vitest suites
#
# See development-guide/design/PLURES-FOUNDATION.md (svelte-Tauri template) and
# crates/cli/Cargo.toml (lib-only `pares_radix_migrate`, no bin → there is no CLI).

name: Real Integration Tests

on:
  push:
    branches: [main, feature/real-testing-infra]
  pull_request:
    branches: [main]

env:
  CARGO_TERM_COLOR: always
  RUST_LOG: info

jobs:
  # ─── Tier 1: MCP server — native JSON-RPC over stdio (vitest + live smoke) ───
  mcp:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4

      - name: Install pnpm
        uses: pnpm/action-setup@v4

      - name: Install Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Sync SvelteKit (generate .svelte-kit/tsconfig.json)
        run: pnpm exec svelte-kit sync

      - name: MCP server vitest
        run: pnpm -C packages/mcp-dev-server test

      - name: MCP stdio JSON-RPC smoke
        run: node packages/mcp-dev-server/smoke.mjs

  # ─── Tier 2: Rust workspace build — app lib + crates compile (real binary) ───
  workspace:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Tauri system deps
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev libgtk-3-dev libayatana-appindicator3-dev librsvg2-dev

      - name: Cache cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-v3-${{ hashFiles('**/Cargo.lock') }}

      - name: Build workspace (release)
        run: cargo build --release --workspace

  # ─── Tier 3: Frontend render modes — gui / tui-css / tui-native + platform ───
  frontend:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4

      - name: Install pnpm
        uses: pnpm/action-setup@v4

      - name: Install Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Sync SvelteKit (generate .svelte-kit/tsconfig.json)
        run: pnpm exec svelte-kit sync

      - name: Render-mode / platform tests
        run: pnpm test
